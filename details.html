<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briefing | 战术详情终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        :root { --retro-orange: #ffb000; --retro-bg: #121212; }
        body { background-color: var(--retro-bg); color: var(--retro-orange); font-family: 'Courier Prime', monospace; -webkit-tap-highlight-color: transparent; }
        .retro-border { border: 1px solid var(--retro-orange); }
        input { background: transparent; border: 1px solid var(--retro-orange); color: var(--retro-orange); outline: none; padding: 12px; font-size: 14px; border-radius: 0; }
        
        /* 地图滤镜与手机端点击穿透 */
        #map-container iframe { filter: invert(90%) hue-rotate(150deg) brightness(0.8) contrast(1.2); mix-blend-mode: screen; pointer-events: auto; }

        /* 移动端拖拽卡片样式 */
        .plan-card { border-left: 4px solid var(--retro-orange); background: rgba(255,176,0,0.03); }
        .drag-handle { 
            cursor: grab; background: rgba(255, 176, 0, 0.1); 
            display: flex; align-items: center; justify-content: center;
            width: 44px; font-size: 18px; font-weight: bold; border-right: 1px solid rgba(255, 176, 0, 0.1);
        }
        .sortable-ghost { opacity: 0.1; background: var(--retro-orange) !important; }
        .sortable-drag { background: #1a1a1a !important; opacity: 1 !important; border: 1px solid var(--retro-orange); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        .tip-box { font-size: 10px; color: #fff; background: rgba(255,176,0,0.15); padding: 5px 8px; margin-top: 6px; display: block; border-radius: 2px; line-height: 1.4; }
        .tag-icon { border: 1px solid var(--retro-orange); padding: 0 4px; font-size: 9px; font-weight: bold; margin-right: 6px; text-transform: uppercase; }
        .scanline { width: 100%; height: 2px; background: rgba(255, 176, 0, 0.05); position: absolute; animation: scan 4s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="p-3 md:p-8">
    <div class="max-w-6xl mx-auto retro-border p-4 md:p-10 relative bg-[#121212] overflow-hidden">
        <div class="scanline"></div>
        <a href="index.html" class="text-[10px] uppercase tracking-widest hover:underline"><< BACK_TO_ROOT</a>
        
        <header class="mt-4 mb-6 border-b border-[#ffb000] pb-4 flex justify-between items-end">
            <div>
                <h1 id="main-title" class="text-2xl md:text-4xl font-bold uppercase italic tracking-tighter">--</h1>
                <p class="text-[9px] opacity-60">>> 正在同步实时地理序列 [SYNCING_GEODATA]</p>
            </div>
            <p id="loc-num" class="text-2xl font-bold italic">00</p>
        </header>

        <div class="flex flex-col gap-6">
            <section class="order-2 lg:order-1">
                <div class="flex flex-col gap-2 mb-8">
                    <div class="flex gap-2">
                        <input id="sub-time" type="text" placeholder="12:00" class="w-20">
                        <input id="sub-place" type="text" placeholder="高铁/酒店/爬山..." class="flex-1">
                    </div>
                    <button onclick="addSub()" class="bg-[#ffb000] text-black py-4 font-bold uppercase text-xs active:invert">Update Timeline</button>
                </div>
                
                <div id="sub-list" class="space-y-4">
                    </div>
            </section>

            <section class="order-1 lg:order-2">
                <h2 class="text-[10px] font-bold mb-2 uppercase opacity-60">>> 动态坐标映射 [MAP_RADAR]</h2>
                <div id="map-container" class="retro-border h-[280px] md:h-[450px] bg-black relative overflow-hidden">
                    <iframe id="map-iframe" width="100%" height="100%" frameborder="0" src="" allowfullscreen></iframe>
                </div>
            </section>
        </div>
    </div>

    <script>
        let travelData = JSON.parse(localStorage.getItem('retro_travel_data'));
        let index = localStorage.getItem('current_trip_index');
        let trip = travelData[index];

        const config = {
            keywords: {
                '高铁': { label: 'TRANSIT', icon: '🚄', tip: '建议提前30min到站，注意检票口信息。' },
                '酒店': { label: 'LODGING', icon: '🏨', tip: '确认前台是否保留房间，检查消防。' },
                '住': { label: 'LODGING', icon: '🏠', tip: '确认退房限制与行李寄存。' },
                '爬山': { label: 'ACTION', icon: '🏔️', tip: '穿防滑鞋，备好充足水分和速干衣。' },
                '餐': { label: 'SUPPLY', icon: '🍴', tip: '建议提前排号，注意饮食卫生。' },
                '吃': { label: 'SUPPLY', icon: '🍚', tip: '注意饮食卫生，尝试当地特色。' }
            },
            default: { label: 'TARGET', icon: '📍', tip: '确认环境安全，保持通讯顺畅。' }
        };

        const subListEl = document.getElementById('sub-list');
        Sortable.create(subListEl, {
            animation: 250,
            handle: '.drag-handle', // 必须按住手柄
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag',
            onEnd: saveOrder
        });

        function render() {
            document.getElementById('main-title').innerText = trip.title;
            const list = document.getElementById('sub-list');
            list.innerHTML = '';
            
            trip.sub_plans.forEach((p, i) => {
                let meta = config.default;
                for (let key in config.keywords) { if (p.place.includes(key)) { meta = config.keywords[key]; break; } }

                const item = document.createElement('div');
                item.setAttribute('data-id', i);
                item.className = 'plan-card flex relative overflow-hidden active:bg-white/5';
                item.innerHTML = `
                    <div class="drag-handle">::</div>
                    <div class="flex-1 p-3">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex flex-wrap items-center gap-1">
                                    <span class="tag-icon">${meta.label}</span>
                                    <span class="text-[10px] opacity-50 mr-2">${p.time}</span>
                                    <span class="font-bold text-sm tracking-wide uppercase">${meta.icon} ${p.place}</span>
                                </div>
                                <div class="tip-box">💡 RECOM: ${meta.tip}</div>
                            </div>
                            <button onclick="delSub(${i})" class="text-[11px] p-2 opacity-60 active:opacity-100">ERASE</button>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
            document.getElementById('loc-num').innerText = trip.sub_plans.length.toString().padStart(2, '0');
            updateMap();
            localStorage.setItem('retro_travel_data', JSON.stringify(travelData));
        }

        function saveOrder() {
            const newOrder = [];
            document.querySelectorAll('#sub-list > div').forEach(el => {
                newOrder.push(trip.sub_plans[el.getAttribute('data-id')]);
            });
            trip.sub_plans = newOrder;
            render();
        }

        function addSub() {
            const time = document.getElementById('sub-time').value || '--:--';
            const place = document.getElementById('sub-place').value;
            if (!place) return;
            trip.sub_plans.push({ time, place });
            document.getElementById('sub-time').value = '';
            document.getElementById('sub-place').value = '';
            render();
        }

        function delSub(i) { trip.sub_plans.splice(i, 1); render(); }

        function updateMap() {
            const mapIframe = document.getElementById('map-iframe');
            if (trip.sub_plans.length > 0) {
                const latestPlace = trip.sub_plans[trip.sub_plans.length - 1].place;
                // 使用强制 HTTPS 的 Embed 接口，适配移动浏览器安全策略
                const searchUrl = `https://maps.google.com/maps?q=${encodeURIComponent(latestPlace)}&t=&z=13&ie=UTF8&iwloc=&output=embed`;
                mapIframe.src = searchUrl;
            } else {
                mapIframe.src = "about:blank";
            }
        }

        window.onload = render;
    </script>
</body>
</html>
