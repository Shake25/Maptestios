<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Travel OS | 任务控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        :root { --retro-orange: #ffb000; --retro-bg: #121212; }
        body { 
            background-color: var(--retro-bg); color: var(--retro-orange); 
            font-family: 'Courier Prime', monospace;
            background-image: linear-gradient(rgba(255, 176, 0, .03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 176, 0, .03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .retro-border { border: 1px solid var(--retro-orange); }
        input, select { 
            background: rgba(0,0,0,0.5) !important; 
            border: 1px solid var(--retro-orange) !important; 
            color: var(--retro-orange) !important; 
            outline: none; 
            border-radius: 0;
            padding: 12px;
            font-size: 14px;
            width: 100%;
        }
        .btn-retro { 
            background: var(--retro-orange); 
            color: black; 
            font-weight: bold; 
            width: 100%;
            padding: 15px;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-retro:active { opacity: 0.7; transform: scale(0.98); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto retro-border p-5 relative bg-[#121212]/90 min-h-[80vh]">
        <div class="absolute top-0 left-0 px-2 py-0.5 bg-[#ffb000] text-black text-[9px] font-bold uppercase">M-SYS_LOGISTICS_V6.6</div>
        
        <header class="mb-8 border-b border-[#ffb000] pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter uppercase italic">Mission Control</h1>
                <p class="text-[10px] opacity-70">>> 系统正常运行中...</p>
            </div>
            <div id="stats" class="text-2xl font-bold">00</div>
        </header>

        <section class="mb-10 space-y-4">
            <div>
                <label class="text-[10px] font-bold uppercase">[ 任务分级 ]</label>
                <select id="type_input">
                    <option value="OVERSEAS">🛂 跨境任务</option>
                    <option value="INTER_PROVINCIAL">🌐 跨省远征</option>
                    <option value="INTER_CITY">🛣️ 跨市移动</option>
                    <option value="LOCAL">📍 同城行动</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold uppercase">[ 目标名称 ]</label>
                <input id="title_input" type="text" placeholder="例如：香港两日游">
            </div>
            <div>
                <label class="text-[10px] font-bold uppercase">[ 部署日期 ]</label>
                <input id="date_input" type="date">
            </div>
            <button onclick="saveMission()" class="btn-retro">Initialize Mission</button>
        </section>

        <section>
            <h2 class="text-[10px] font-bold mb-4 opacity-50 uppercase tracking-widest">>> 任务数据库</h2>
            <div id="list-container" class="space-y-3"></div>
        </section>
    </div>

    <script>
        // 初始化数据
        let travelData = JSON.parse(localStorage.getItem('retro_travel_data')) || [];

        function render() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            
            if (travelData.length === 0) {
                container.innerHTML = `<div class="text-center py-10 opacity-30 italic text-sm">NO MISSIONS FOUND</div>`;
            }

            travelData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'border border-[#ffb000]/40 p-4 flex justify-between items-center bg-black/20';
                card.onclick = (e) => { if(e.target.tagName !== 'BUTTON') goToDetails(index); };
                
                card.innerHTML = `
                    <div>
                        <div class="text-[9px] opacity-60 uppercase">${item.type} // ${item.date || 'TBD'}</div>
                        <div class="text-lg font-bold uppercase">${item.title}</div>
                    </div>
                    <button onclick="removeMission(event, ${index})" class="text-[10px] border border-[#ffb000]/40 px-3 py-1">ERASE</button>
                `;
                container.appendChild(card);
            });

            // 更新计数器
            document.getElementById('stats').innerText = travelData.length.toString().padStart(2, '0');
            // 同步到存储
            localStorage.setItem('retro_travel_data', JSON.stringify(travelData));
        }

        function saveMission() {
            const titleVal = document.getElementById('title_input').value;
            const typeVal = document.getElementById('type_input').value;
            const dateVal = document.getElementById('date_input').value;

            if (!titleVal) {
                alert("ERR: MISSION NAME REQUIRED");
                return;
            }

            // 创建新对象
            const newMission = {
                type: typeVal,
                title: titleVal,
                date: dateVal,
                sub_plans: [] // 初始子计划为空
            };

            // 压入数组并渲染
            travelData.push(newMission);
            render();

            // 清空输入框
            document.getElementById('title_input').value = '';
        }

        function removeMission(e, index) {
            e.stopPropagation();
            if(confirm("CONFIRM ERASE?")) {
                travelData.splice(index, 1);
                render();
            }
        }

        function goToDetails(index) {
            localStorage.setItem('current_trip_index', index);
            window.location.href = 'details.html';
        }

        // 页面加载后首次渲染
        window.onload = render;
    </script>
</body>
</html>
